name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test:
    runs-on: windows-latest

    steps:
      # リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # uvのインストール
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      
      # 依存関係のインストール（開発用依存関係を含む）
      - name: Install dependencies
        run: |
          uv sync --all-extras
      
      # Ruffによるlintチェック
      - name: Run Ruff check
        run: |
          uv run ruff check .

      - name: Run pyright check
        run: |
          uv run pyright

      - name: Run pytest
        run: |
          uv run pytest
